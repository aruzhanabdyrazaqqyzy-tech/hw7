<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Frontend Mentor | Order summary card</title>
</head>
<body class="min-h-screen flex items-center justify-center bg-blue-100">
  <div class=" bg-white  max-h-full w-full max-w-md h-150 rounded-b-lg ">
    <img class="rounded-t-xl" src="illustration-hero.svg" alt="hero">
    <div class="">
      <h1 class="text-center font-bold text-blue-950 text-2xl pt-5 pb-5">Order Summary</h1>
      <p class="text-center text-gray-400  text-md pb-5 "> You can now listen to millions of songs,<br> audiobooks, and podcasts on any device <br> anywhere you like!</p>

   <div class="bg-purple-50 rounded-xl w-full max-w-md flex  items-center justify-between p-4 sm:p-6 ">
    <div class="flex items-center gap-4">
     <img class="w-10 h-10" src="icon-music.svg" alt="music">
   
    <div class="flex flex-col">
      <h4 class="font-bold text-blue-950 text-sm">Annual Plan</h4>
      <span class="text-gray-400 text-xs">$59.99/year</span>
    </div>
    </div>
  
      <a class="text-blue-800 font-bold pr-50" href="#">Change</a>
    
  </div>
  <div class="flex flex-col items-center mt-5 gap-3 ">
    <button class="bg-blue-800 w-full max-w-xs h-10 rounded-xl text-white font-bold">Proceed to Payment</button>
    <button class="text-gray-400 font-bold">Cancel Order</button>
  </div>
    </div>
  </div>
</body>
</html>
